# New-API Docker Compose Configuration
# 
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3000
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and SQL_DSN line 15
#   2. Uncomment the mysql service and SQL_DSN line 16
#   3. Uncomment mysql in depends_on (line 28)
#   4. Uncomment mysql_data in volumes section (line 64)
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/new-api:opencub
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3001:3000"  # 💡 建议改为 3001，因为你的 Grafana 可能也想用 3000
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:123456@new-api-postgres:5432/new-api
      - REDIS_CONN_STRING=redis://new-api-redis:6379 # 💡 指向新的 Redis 容器名
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
    depends_on:
      - new-api-redis
      - new-api-postgres
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 💡 这里的容器名改为了 new-api-redis，避免和系统已有的 redis 冲突
  new-api-redis:
    image: redis:latest
    container_name: new-api-redis
    restart: always
    # 💡 注意：这里没有写 ports，因为它只在 new-api-network 内部给 new-api 使用
    # 这样就不会和宿主机的 6379 端口打架了
    networks:
      - new-api-network

  # 💡 这里的容器名改为了 new-api-postgres
  new-api-postgres:
    image: postgres:15
    container_name: new-api-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network

volumes:
  pg_data:

networks:
  new-api-network:
    driver: bridge
